<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>채팅 다이제스트 안내</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f5f7fb;
    --card: #ffffff;
    --text: #111827;
    --sub: #4b5563;
    --line: #dbe2ea;
    --accent: #2563eb;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at top, rgba(37, 99, 235, 0.12), transparent 28%),
      linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    color: var(--text);
  }

  .card {
    width: min(100%, 520px);
    padding: 28px 24px;
    border: 1px solid var(--line);
    border-radius: 24px;
    background: color-mix(in srgb, var(--card) 92%, #eef4ff 8%);
    box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
  }

  h1 {
    margin: 0 0 12px;
    font-size: 28px;
    line-height: 1.25;
  }

  p {
    margin: 0;
    color: var(--sub);
    line-height: 1.7;
    word-break: keep-all;
  }

  .hint {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    font-size: 14px;
  }

  strong {
    color: var(--accent);
  }
</style>
</head>
<body>
  <main class="card">
    <h1>채팅 다이제스트 안내</h1>
    <p>이 페이지는 공개 홈이에요.</p>
    <p>강의별 다이제스트는 <strong>직접 전달받은 전용 링크</strong>로만 접속해 주세요.</p>
    <p class="hint">루트 주소에서는 강의별 정리 내용을 노출하지 않아요.</p>
  </main>
</body>
</html>
